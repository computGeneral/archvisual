<!DOCTYPE html>
<html>

<head>
    <title>TraceViewer</title>
    <link rel="icon" href="/static/image/traceviewer.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            width: 100%;
            overflow: hidden;
        }

        .nav-bar {
            height: 14px;
            line-height: 14px;
            overflow: hidden;
            background-color: #333;
            font-family: sans-serif;
            font-size: 80%;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .nav-bar.hidden {
            display: none !important;
        }

        .content {
            flex: 1;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .footer {
            width: 100%;
            height: 20px;
            background-color: #ddd;
            text-align: center;
            font-family: sans-serif;
            font-size: 80%;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .split-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .split-container.horizontal {
            flex-direction: row;
        }

        .split-panel {
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            position: relative;
            border: 1px solid #ccc;
        }

        .split-panel.active {
            border: 2px solid #007bff;
        }

        .split-panel iframe {
            width: 100%;
            height: 100%;
            height: 100%;
            border: none;
            display: block;
            pointer-events: none;
        }

        .split-panel.active iframe {
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        /* Embedded mode adjustments */
        body.embedded .nav-bar {
            display: none !important;
        }
        body.embedded .footer {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="nav-bar">
            <a id="path" href='admin' style="float: left; font-weight: bold; color: #fff;">ArchVisual</a>
            <span id="split" style="float: left; margin-left: 2px;">:</span>
            <!--
            <a id="path" href='summaryviewer' style="float: left; margin-left: 2px; margin-right: 2px; color: #fff;">SummaryVis</a>
            <span id="split" style="float: left; margin-left: 2px;">|</span>
            -->
            <a id="path" href='metricviewer' style="float: left; margin-left: 2px; margin-right: 2px; color: #fff;">MetricViewer</a>
            <span id="split" style="float: left; margin-left: 2px;">|</span>
            <a id="path" href='traceviewer' style="float: left; margin-left: 2px; margin-right: 2px; font-weight: bold; color: #fff;">TraceViewer</a>
            <span id="split" style="float: left; margin-left: 2px;">|</span>
            <a id="path" href='crossviewer' style="float: left; margin-left: 2px; margin-right: 2px; color: #fff;">CrossViewer</a>
        </div>
        <div class="content">
            <div id="splitContainer" class="split-container">
                <div id="panel1" class="split-panel" onclick="handlePanelClick(event, 1)">
                    <iframe id="catapult_frame1" src="/static/catapult_trace_viewer.html?v=20260626p"></iframe>
                </div>
                <div id="panel2" class="split-panel hidden" onclick="handlePanelClick(event, 2)">
                    <iframe id="catapult_frame2" src="/static/catapult_trace_viewer.html?v=20260626p"></iframe>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>(c) Copyright 2024-2030 computGeneral Limited. All Rights Reserved</p>
        </div>
    </div>
</body>
<script>
    // Check if page is embedded
    const urlParams = new URLSearchParams(window.location.search);
    const isEmbedded = urlParams.get('embedded') === 'true';

    // Hide nav-bar if embedded and add embedded class to body
    if (isEmbedded) {
        const navBar = document.querySelector('.nav-bar');
        if (navBar) {
            navBar.classList.add('hidden');
        }
        const footer = document.querySelector('.footer');
        if (footer) {
            footer.classList.add('hidden');
        }
        document.body.classList.add('embedded');
    }

    // Dual view state
    var isSplitView = false;
    var splitDirection = 'horizontal';
    var activePanel = 1;

    function setSplitMode(mode) {
        var panel2 = document.getElementById('panel2');
        var splitContainer = document.getElementById('splitContainer');

        if (mode === 'single') {
            isSplitView = false;
            panel2.classList.add('hidden');
            splitContainer.classList.remove('horizontal');
            activePanel = 1;
            setActivePanel(1);
        } else {
            isSplitView = true;
            splitDirection = mode;
            panel2.classList.remove('hidden');
            if (mode === 'horizontal') {
                splitContainer.classList.add('horizontal');
            } else {
                splitContainer.classList.remove('horizontal');
            }
        }

        // Split state indicator now managed by catapult via SPLIT_ACK
    }

    // Set active panel for operations
    function setActivePanel(panel) {
        activePanel = panel;
        var panel1 = document.getElementById('panel1');
        var panel2 = document.getElementById('panel2');

        if (panel === 2) {
            panel1.classList.remove('active');
            panel2.classList.add('active');
        } else {
            panel1.classList.add('active');
            panel2.classList.remove('active');
        }
    }

    // Handle panel click with event propagation stop
    function handlePanelClick(event, panel) {
        event.stopPropagation();
        setActivePanel(panel);
    }

    // Get active iframe
    function getActiveIframe() {
        if (activePanel === 2) {
            return window.frames[1] || document.getElementById('catapult_frame2').contentWindow;
        }
        return window.frames[0] || document.getElementById('catapult_frame1').contentWindow;
    }

    // ---- Server API message handler for catapult iframes ----
    // Catapult's Polymer environment blocks network requests, so we use
    // postMessage to route API calls through the parent window.
    window.addEventListener('message', function(e) {
        console.log('[parent] got postMessage:', e.data && e.data.type, 'from:', e.source === window.frames[0] ? 'frame1' : e.source === (window.frames[1] || null) ? 'frame2' : 'unknown');
        if (!e.data || !e.data.type) return;
        var msgId = e.data._msgId;
        var iframeWindow = e.source;

        if (e.data.type === 'LIST_DIR') {
            console.log('[parent] LIST_DIR path:', e.data.path);
            fetch('/api/show/server_list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json;charset=utf-8' },
                body: JSON.stringify({ path: e.data.path || '' })
            }).then(function(r) { return r.json(); }).then(function(res) {
            console.log('[parent] LIST_DIR response, posting back to iframe');
                iframeWindow.postMessage({
                    code: res.code,
                    msg: res.msg,
                    path: res.data ? res.data.path : null,
                    parent: res.data ? res.data.parent : null,
                    entries: res.data ? res.data.entries : [],
                    _msgId: msgId
                }, '*');
            }).catch(function(err) {
                iframeWindow.postMessage({ code: 1, msg: 'Network error: ' + err, _msgId: msgId }, '*');
            });
        } else if (e.data.type === 'SET_SPLIT') {
            setSplitMode(e.data.mode);
            var ackMode = isSplitView ? splitDirection : 'single';
            iframeWindow.postMessage({ type: 'SPLIT_ACK', mode: ackMode }, '*');
        } else if (e.data.type === 'GET_FILE') {
            fetch('/api/show/server_file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json;charset=utf-8' },
                body: JSON.stringify({ path: e.data.path })
            }).then(function(r) { return r.json(); }).then(function(res) {
                iframeWindow.postMessage({
                    code: res.code,
                    msg: res.msg,
                    name: res.data ? res.data.name : null,
                    content: res.data ? res.data.content : null,
                    _msgId: msgId
                }, '*');
            }).catch(function(err) {
                iframeWindow.postMessage({ code: 1, msg: 'Network error: ' + err, _msgId: msgId }, '*');
            });
        }
    });

    // ---- BroadcastChannel sync ----

    const bc = new BroadcastChannel('klxarch');
    window.bc = bc;
    bc.onmessage = function (e) {
        console.log('Receive Channel data:', e.data);
        if (e.data.type == "SYNC_METRIC_TO_TRACE") {
            let { center, duration } = e.data;
            var iframeWindow = getActiveIframe();
            let view = iframeWindow._tview;
            view.zoomToTarget(center, duration);
        }
    };
    function child_view_change_event(center, duration, scale) {
        const msg = {
            type: "SYNC_TRACE_TO_METRIC",
            center: center,
            duration: duration
        }
        console.log("SYNC", msg, scale);
        window.bc.postMessage(msg);
    }

    // Initialize active panel state on page load
    document.addEventListener('DOMContentLoaded', function() {
        setActivePanel(1);
    });
</script>

</html>
